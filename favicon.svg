<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0010"/>
      <stop offset="100%" stop-color="#0d0007"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8B8D4"/>
      <stop offset="50%" stop-color="#F04C8A"/>
      <stop offset="100%" stop-color="#C73470"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#C73470"/>
      <stop offset="100%" stop-color="#FFD6EA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle pink border -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#F04C8A" stroke-width="1.2" opacity="0.35"/>

  <!-- Left stem of H -->
  <rect x="12" y="12" width="8" height="40" rx="4" fill="url(#pink)" filter="url(#glow)"/>

  <!-- Right stem of H -->
  <rect x="44" y="12" width="8" height="40" rx="4" fill="url(#pink)" filter="url(#glow)"/>

  <!-- Crossbar of H -->
  <rect x="12" y="27" width="40" height="8" rx="4" fill="url(#pink)" filter="url(#glow)"/>

  <!-- Ember spark top-right -->
  <circle cx="51" cy="13" r="4" fill="#F04C8A" opacity="0.9" filter="url(#glow)"/>
  <circle cx="51" cy="13" r="2" fill="#FFD6EA"/>

  <!-- Tiny ember dots -->
  <circle cx="56" cy="8"  r="1.5" fill="#F04C8A" opacity="0.6"/>
  <circle cx="58" cy="14" r="1"   fill="#F8B8D4" opacity="0.5"/>
</svg>
